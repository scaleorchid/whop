<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout</title>
    <script
      async
      defer
      src="https://js.whop.com/static/checkout/loader.js"
    ></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .checkout-container {
        width: 100%;
        max-width: 480px;
      }
    </style>
  </head>
  <body>
    <div class="checkout-container">
      <!--
        REPLACE plan_XXXXXXXXX with your actual Whop Plan ID.
        REPLACE the return-url with your actual post-checkout URL.
      -->
      <div
        data-whop-checkout-plan-id="plan_2uWtxsH7OROLx"
        data-whop-checkout-setup-future-usage="off_session"
        data-whop-checkout-return-url="https://www.scaleorchid.com/booked"
        data-whop-checkout-theme="light"
      ></div>
    </div>
  </body>
</html>
